name: build

on: [push]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install MPFR
        run: sudo apt install -y libmpfr6 libmpfr-dev
      - name: Build
        uses: threeal/cmake-action@v2.1.0
      - name: Test
        uses: threeal/ctest-action@v1.1.0
        with:
          verbose: true

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install MPFR
        run: brew install mpfr
      - name: Export homebrew paths
        uses: spezifisch/export-homebrew-build-paths@v1.0.0
      - name: Build
        uses: threeal/cmake-action@v2.1.0
      - name: Test
        uses: threeal/ctest-action@v1.1.0
        with:
          verbose: true

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install MPFR
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-mpfr mingw-w64-x86_64-cmake mingw-w64-x86_64-make mingw-w64-x86_64-gcc
      - name: Set MPFR root
        run: |
          echo "MPFR_ROOT=C:\msys64\mingw64" >> $env:GITHUB_ENV
      - name: Add MSYS2 MinGW to PATH
        run: |
          echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH
      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build -S . -G "MinGW Makefiles"
          cmake --build build
      - name: Test
        shell: msys2 {0}
        run: |
          ctest --test-dir 'build' --output-on-failure --no-tests=error --verbose
